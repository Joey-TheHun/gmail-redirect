<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting to Gmail...</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f5f5f5; }
    .box { text-align: center; padding: 2rem; }
    .spinner { border: 3px solid #ddd; border-top: 3px solid #4285f4; border-radius: 50%; width: 32px; height: 32px; animation: spin 0.8s linear infinite; margin: 1rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #666; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>Opening email...</p>
  </div>
  <script>
    var params = new URLSearchParams(window.location.search);
    var mid = params.get('mid');
    if (mid) {
      window.location.replace('https://mail.google.com/mail/#all/' + mid);
    } else {
      document.querySelector('.box').innerHTML = '<h2>Missing ?mid= parameter</h2><p>Usage: ?mid=MESSAGE_ID</p>';
    }
  </script>
</body>
</html>
