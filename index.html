<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Open in Gmail</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f5f5f5; }
    .box { text-align: center; padding: 2rem; }
    .btn { display: inline-block; padding: 16px 32px; background: #4285f4; color: #fff; text-decoration: none; border-radius: 8px; font-size: 18px; font-weight: 600; box-shadow: 0 2px 8px rgba(66,133,244,0.3); }
    .btn:active { background: #3367d6; }
    .sub { color: #999; font-size: 13px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="box" id="box">
    <p>Loading...</p>
  </div>
  <script>
    var params = new URLSearchParams(window.location.search);
    var mid = params.get('mid');
    var account = params.get('account') || 'info@joyprint.com.au';
    var box = document.getElementById('box');
    if (mid) {
      var url = 'https://mail.google.com/mail/u/' + account + '/#all/' + mid;
      box.innerHTML = '<a class="btn" href="' + url + '">Open in Gmail &rarr;</a>'
        + '<p class="sub">Tap to view this email</p>';
    } else {
      box.innerHTML = '<h2>Missing ?mid= parameter</h2><p>Usage: ?mid=MESSAGE_ID</p>';
    }
  </script>
</body>
</html>
